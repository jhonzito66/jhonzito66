name: Generate Profile Output

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: jhonzito66
          outputs: |
            dist/github-contribution-grid-snake.svg
          snake_color: "6366F1"

      - name: Generate 3D contribution graph
        uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: jhonzito66

      - name: Deploy to output branch
        run: |
          mkdir -p /tmp/profile-output
          cp dist/github-contribution-grid-snake.svg /tmp/profile-output/

          if [ -f profile-3d-contrib/profile-night-view.svg ]; then
            cp profile-3d-contrib/profile-night-view.svg /tmp/profile-output/profile-3d-contrib.svg
          elif [ -f profile-3d-contrib/profile-green-animate.svg ]; then
            cp profile-3d-contrib/profile-green-animate.svg /tmp/profile-output/profile-3d-contrib.svg
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin output 2>/dev/null || true
          git checkout output 2>/dev/null || git checkout --orphan output
          cp /tmp/profile-output/* .
          git add github-contribution-grid-snake.svg profile-3d-contrib.svg
          git diff --staged --quiet || git commit -m "chore: update snake and 3D contribution graphs"
          git push origin output --force
