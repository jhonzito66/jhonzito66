name: Generate 3D Contributions

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: github-profile-3d-contrib/render@master
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: jhonzito66

      - name: Push to output branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin output 2>/dev/null || true
          git checkout output 2>/dev/null || git checkout --orphan output
          find . -path ./.git -prune -o -name "profile-3d-contrib.svg" -print -exec cp {} ./profile-3d-contrib.svg \;
          git add profile-3d-contrib.svg
          git diff --staged --quiet || git commit -m "chore: update 3D contribution graph"
          git push origin output --force
